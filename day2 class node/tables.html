<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Example</title>
</head>
<body>
    <h1 align="center">IBM Employee Details</h1>
    <table align="center" border="5" cellspacing="2" cellpadding="5">
        <colgroup>
        <col span="2" bgcolor="pink">
        <col span="1" bgcolor="purple">
        <col span="2" bgcolor="green">
    </colgroup>
        <thead>
            <tr>
                <th>ID</th>
                <th>NAME</th>
                <th>SALARY</th>
                <th>ROLE</th>
                <th>ADDRESS</th>
                <th>ACTIONS</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>E100</td>
                <td>Ravi</td>
                <td rowspan="2">900000</td>
                <td>Developer</td>
                <td>Vizag</td>
                <td><button>Edit</button>
                    <button>Delete</button></td>
            </tr>
            <tr>
                <td>E200</td>
                <td>Srinu</td>
                <td>Full Stack developer</td>
                <td>banglore</td>
                <td><button>Edit</button>
                    <button>Delete</button></td></td>
            </tr>
            <tr>
                <td>E300</td>
                <td>Vamsi</td>
                <td>1200000</td>l̥ō
                <td>Mern Developer</td>
                <td>Kochi</td>
                <td><button>Edit</button>
                    <button>Delete</button></td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td align="center" bgcolor="brown" colspan="6">2026&COPY; copyright</td>
            </tr>
        </tfoot>
    </table>

    
    <br>
    <table border="6" cellspacing="50" cellpadding="50" align="center" bgcolor="orange">
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
            <td>9</td>
        </tr>
    </table>
</body>
</html>
