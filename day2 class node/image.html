<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Other tags</title>
</head>
<body>
    <marquee behaviour="" direction=""
    bgcolor="lavender" height="250" width="700" loop="2">

    </marquee>
    <marquee behaviour="" direction="right" scrollamount="30"
    bgcolor="beige">
        <h1>Along with scrollamount and direction</h1>
        <img src="https://wallpapertag.com/wallpaper/full/8/6/d/142793-free-download-4k-nature-wallpapers-3840x2160.jpg" alt="" height="150" width="250">
    </marquee>
    <marquee behaviour="slide" direction="up"
    bgcolor="mage">
        <img src="https://wallpapertag.com/wallpaper/full/8/6/d/142793-free-download-4k-nature-wallpapers-3840x2160.jpg" alt="" height="100" width="100">

</marquee>

<br>
