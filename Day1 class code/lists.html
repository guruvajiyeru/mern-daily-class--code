<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>LISTS</title>
</head>
<body>
    <h1>Ordered list without shortcut</h1>
    <ol>
        <li>list -1</li>   <!--typed the list manually-->
        <li>list -2</li>
        <li>list -3</li>
        <li>list -4</li>
        <li>list -5</li>
    </ol>
    <h1>Ordered list using shortcut</h1>
    <ol>
        <li>list -1</li>    <!--Used shortcut ol>li{list -$}*5-->
        <li>list -2</li>
        <li>list -3</li>
        <li>list -4</li>
        <li>list -5</li>
    </ol>
</body>
</html>
