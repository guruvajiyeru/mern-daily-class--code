<!DOCTYPE html>
<html>
<head>
    <title>Interactive Student Result Table</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #333;
            color: white;
        }

        button {
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
        }

        .green { background: #a5d6a7; }
        .yellow { background: #fff59d; }
        .orange { background: #ffcc80; }
        .red { background: #ef9a9a; }

    </style>
</head>

<body>

<h2>Student Result Table</h2>

<table id="studentTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>cn</th>
            <th>cns</th>
            <th>dlco</th>
            <th>dwdm</th>
            <th>Total</th>
            <th>Percentage</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

let students = [
    {name:"vaji", roll:"23NR1A05J3", marks:[50,78,80,69]},
    {name:"Sita", roll:"23NR1A0596", marks:[90,88,85,92]},
    {name:"sri", roll:"23NR1A05J1", marks:[40,45,50,35]},
    {name:"John", roll:"23NR1A05H0", marks:[60,65,70,75]}
];

function getGradeClass(percent){
    if(percent >= 85) return "green";
    else if(percent >= 65) return "yellow";
    else if(percent >= 55) return "orange";
    else return "red";
}

function displayTable(){
    let tbody = document.querySelector("#studentTable tbody");
    tbody.innerHTML = "";

    students.forEach((stu, index) => {

        let total = stu.marks.reduce((a,b)=>a+b,0);
        let percent = (total/400)*100;

        let row = `<tr class="${getGradeClass(percent)}">
            <td>${stu.name}</td>
            <td>${stu.roll}</td>
            <td>${stu.marks[0]}</td>
            <td>${stu.marks[1]}</td>
            <td>${stu.marks[2]}</td>
            <td>${stu.marks[3]}</td>
            <td>${total}</td>
            <td>${percent.toFixed(2)}%</td>
            <td>
                <button onclick="editStudent(${index})">Edit</button>
                <button onclick="deleteStudent(${index})">Delete</button>
            </td>
        </tr>`;

        tbody.innerHTML += row;
    });
}

function deleteStudent(index){
    students.splice(index,1);
    displayTable();
}

function editStudent(index){
    let stu = students[index];

    let name = prompt("Enter Name:", stu.name);
    let m1 = prompt("cn:", stu.marks[0]);
    let m2 = prompt("cns:", stu.marks[1]);
    let m3 = prompt("dlco:", stu.marks[2]);
    let m4 = prompt("dwdm:", stu.marks[3]);

    students[index] = {
        name: name,
        roll: stu.roll,
        marks: [Number(m1),Number(m2),Number(m3),Number(m4)]
    };

    displayTable();
}

// Initial display
displayTable();

</script>

</body>
</html>
