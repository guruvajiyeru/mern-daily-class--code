<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Survey Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            margin: 0;
        }

        .container {
            width: 450px;
            margin: 50px auto;
            padding: 25px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #007BFF;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        textarea {
            resize: none;
        }

        /* Radio alignment */
        .radio-group {
            margin-top: 5px;
        }

        .radio-group label {
            display: inline-block;
            margin-right: 15px;
            font-weight: normal;
        }

        .radio-group input {
            width: auto;
            margin-right: 5px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Customer Survey Form</h2>

    <form>

        <!-- Name -->
        <label for="name">Customer Name</label>
        <input type="text" id="name" name="customer_name"
               placeholder="Enter your full name" required>

        <!-- Email -->
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email"
               placeholder="Enter your email address" required>

        <!-- Date -->
        <label for="date">Date of Service</label>
        <input type="date" id="date" name="service_date" required>

        <!-- Dropdown -->
        <label for="service">Type of Service Used</label>
        <select id="service" name="service_type" required>
            <option value="">-- Select Service --</option>
            <option value="laptop">Laptop Repair</option>
            <option value="internet">Internet Issue</option>
            <option value="software">Software Support</option>
            <option value="hardware">Hardware Service</option>
        </select>

        <!-- Radio -->
        <label>Rate Our Service</label>
        <div class="radio-group">
            <label><input type="radio" name="rating" value="excellent" required> Excellent</label>
            <label><input type="radio" name="rating" value="good"> Good</label>
            <label><input type="radio" name="rating" value="average"> Average</label>
            <label><input type="radio" name="rating" value="poor"> Poor</label>
        </div>

        <!-- Feedback -->
        <label for="feedback">Additional Feedback</label>
        <textarea id="feedback" name="feedback" rows="4"
                  placeholder="Write your feedback here..."></textarea>

        <!-- Submit -->
        <button type="submit" class="btn">Submit</button>

    </form>
</div>

</body>
</html>
