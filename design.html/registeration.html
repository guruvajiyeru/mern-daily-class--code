<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        label {
            margin-top: 10px;
            display: block;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: #007BFF;
            outline: none;
        }

        .inline {
            width: auto;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>User Registration form</h2>

    <form>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname"
               placeholder="Enter your name"
               required pattern="[A-Za-z ]+"
               title="Only letters are allowed">

        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="Enter your email"
               required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               required minlength="6"
               placeholder="Min 6 characters">

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password"
               name="confirm_password"
               required
               placeholder="Re-enter password">

        <label>Gender</label>
        <input type="radio" name="gender" value="male" class="inline" required> Male
        <input type="radio" name="gender" value="female" class="inline"> Female

        <label>Hobbies</label>
        <input type="checkbox" name="hobbies[]" value="reading" class="inline"> Reading
        <input type="checkbox" name="hobbies[]" value="sports" class="inline"> Sports

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
