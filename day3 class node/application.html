<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            background-image: url('https://tse3.mm.bing.net/th/id/OIP.0VMmUm2oBtRZMGHdZOes5gHaE8?pid=Api&P=0&h=180');
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
        }
        fieldset{
            border: none;
            backdrop-filter: blur;
            margin: 20px;
            padding: 30px;
            border-radius: 10px 50px;
            box-shadow: 10 10 5px aliceblue;
        }
        label{

            color: aqua;
            font-size: 30px;
            margin-right: 30px;
        }
        button{
            padding: 10px 30px;
            background-color: blueviolet;
            font-style: italic;
font-family: 'Courier New', Courier, monospace;
border-radius: 8px;

        }
        h1{
            text-align: center;
            
            color: transparent;
            background-image: linear-gradient(red,yellow); 
            background-clip: text;
        }
    </style>
</head>
<body>
    <form action="" method="post">
<fieldset>
<h1>job application form</h1>
<label for="fname">first time:</label>
<input type="text" id="fname" maxlength="8" minlength="3"
required placeholder="enter first name">

<br><br>
<label for="lname">last name:</label>
<input type="text" id="lname" placeholder="enter last name" minlength="3" maxlength="5">
<br><br>
<label for="">email:</label>
<input type="email" id="email" required placeholder="enter email">
<br><br>
<label for="phno">phone no:</label>
<input type="tel" pattern="[6-9]{1}[0-9]{9}" id="phno" required placeholder="+91">
<br><br>
<label for="state">state</label>
<select name=""id="state">
    <option value="ap">ap</option>
    <option value="kp">ap</option>
    <option value="kl">kl</option>
</select>
<br><br>
<label for="address">address:</label>
<textarea name="" rows="3" cols="30" id="address" placeholder="enter full address"></textarea>
<br><br>
<label for="dob">dob</label>
<input type="date" id="dob" required>
<br><br>
<label for="age">age</label>
<input type="number" id="age" required placeholder="enter your age">
<br><br>
<label for="gender">gender:</label>
<input type="radio" name="gender">male 
<input type="radio" name="gender">female
<input type="radio" name="gender">mahesh
<br><br>

<button type="submit">submit</button>
</fieldset>


    </form>
</body>
</html>
